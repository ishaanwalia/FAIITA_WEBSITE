name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit -p .

      - name: Build
        # Static generation touches the database (Prisma calls in several
        # pages), so DATABASE_URL/DIRECT_URL must be set as repo secrets
        # (Settings → Secrets and variables → Actions) pointing at a
        # non-production Postgres instance — see README.md "Database setup".
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          NEXT_PUBLIC_SITE_URL: https://www.faiita.co.in
